<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — The Notion Collective</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav">
        <a href="/">The Notion Collective</a>
      </nav>
    </header>

    <main>
      <h1>Contact</h1>

      <address>
        <a href="mailto:info@notioncollective.com">info@notioncollective.com</a><br />
        (347) 390-0814<br />
        250 Greenpoint Ave #12<br />
        Brooklyn, NY 11222
      </address>

      <section>
        <h2>Newsletter Signup</h2>
        <form>
          <label for="email">Email Address <abbr title="required">*</abbr></label>
          <input type="email" id="email" name="email" required />

          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first_name" />

          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last_name" />

          <button type="submit">Subscribe</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; The Notion Collective</p>
      <p><a href="mailto:info@notioncollective.com">info@notioncollective.com</a></p>
    </footer>
  </body>
</html>
